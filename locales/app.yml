# MtpOpError user-facing text
error.device_busy:
  en: Device is in use by another application (e.g. ptpcamerad on macOS). Disconnect it and try again.
  zh-CN: 设备被其他应用占用(例如 macOS 上的 ptpcamerad)。请断开后重试。
  zh-HK: 裝置正被其他應用程式使用(例如 macOS 上的 ptpcamerad)。請中斷連線後再試。
  ja: デバイスは他のアプリケーション(macOS の ptpcamerad など)が使用中です。切断してからもう一度お試しください。
error.no_storages:
  en: No storages on device
  zh-CN: 设备上没有可用存储
  zh-HK: 裝置上沒有可用的儲存空間
  ja: デバイスにストレージがありません
error.io:
  en: 'I/O error: %{message}'
  zh-CN: I/O 错误:%{message}
  zh-HK: 'I/O 錯誤:%{message}'
  ja: 'I/O エラー: %{message}'

