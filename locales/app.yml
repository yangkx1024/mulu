# Status messages
status.no_devices:
  en: No MTP devices found
  zh-CN: 未发现 MTP 设备
  zh-HK: 找不到 MTP 裝置
  ja: MTP デバイスが見つかりません
status.disconnected:
  en: Device disconnected
  zh-CN: 设备已断开
  zh-HK: 裝置已中斷連線
  ja: デバイスが切断されました
status.connecting:
  en: Connecting…
  zh-CN: 正在连接……
  zh-HK: 正在連線……
  ja: 接続中…
status.loading:
  en: Loading…
  zh-CN: 正在加载……
  zh-HK: 正在載入……
  ja: 読み込み中…
status.items:
  en: '%{count} items'
  zh-CN: '%{count} 项'
  zh-HK: '%{count} 項'
  ja: '%{count} 項目'
status.uploading:
  en: 'Uploading %{count} file(s)…'
  zh-CN: 正在上传 %{count} 个文件……
  zh-HK: 正在上傳 %{count} 個檔案……
  ja: '%{count} 件のファイルをアップロード中…'
status.exporting:
  en: 'Exporting %{name}…'
  zh-CN: 正在导出 %{name}……
  zh-HK: 正在匯出 %{name}……
  ja: '%{name} を書き出し中…'
status.exported:
  en: Exported
  zh-CN: 导出完成
  zh-HK: 匯出完成
  ja: 書き出しました
status.exporting_folder:
  en: 'Exporting folder %{name}…'
  zh-CN: 正在导出文件夹 %{name}……
  zh-HK: 正在匯出資料夾 %{name}……
  ja: 'フォルダ %{name} を書き出し中…'
status.exported_folder:
  en: Folder exported
  zh-CN: 文件夹导出完成
  zh-HK: 資料夾匯出完成
  ja: フォルダを書き出しました
status.deleting:
  en: Deleting…
  zh-CN: 正在删除……
  zh-HK: 正在刪除……
  ja: 削除中…
status.update_available:
  en: 'New version %{version} available'
  zh-CN: 发现新版本 %{version}
  zh-HK: 有新版本 %{version}
  ja: 新しいバージョン %{version} があります

# Errors surfaced as status text
