error.upload_failed:
  en: 'Upload failed: %{message}'
  zh-CN: 上传失败:%{message}
  zh-HK: '上傳失敗:%{message}'
  ja: 'アップロードに失敗しました: %{message}'
error.export_failed:
  en: 'Export failed: %{message}'
  zh-CN: 导出失败:%{message}
  zh-HK: '匯出失敗:%{message}'
  ja: '書き出しに失敗しました: %{message}'
error.export_folder_failed:
  en: 'Folder export failed: %{message}'
  zh-CN: 文件夹导出失败:%{message}
  zh-HK: '資料夾匯出失敗:%{message}'
  ja: 'フォルダの書き出しに失敗しました: %{message}'
error.delete_failed:
  en: 'Delete failed: %{message}'
  zh-CN: 删除失败:%{message}
  zh-HK: '刪除失敗:%{message}'
  ja: '削除に失敗しました: %{message}'
error.create_failed:
  en: 'Create failed: %{message}'
  zh-CN: 创建失败:%{message}
  zh-HK: '建立失敗:%{message}'
