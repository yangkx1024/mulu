name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "locales/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "src/**"
      - "locales/**"
      - "Cargo.toml"
      - "Cargo.lock"

jobs:
  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libclang-dev \
            libdbus-1-dev \
            libfontconfig-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Cargo check
        run: cargo check
