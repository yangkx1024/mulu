[package]
name = "ympt"
version = "0.1.0"
edition = "2024"

[dependencies]
gpui = { git = "https://github.com/zed-industries/zed" }
gpui_platform = { git = "https://github.com/zed-industries/zed", features = ["font-kit", "x11", "wayland"] }
gpui-component = "0.5.1"
mtp-rs = "0.13.1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

# `gpui` 0.2.2 pins `core-foundation = "=0.10.0"`,
# `mtp-rs` v0.11.0 -> `nusb` v0.2 use `core-foundation = "0.10.1"`.
# patch to 0.10.0 locally to accept the same version until upstream dependencies converge.
[patch.crates-io]
nusb = { path = "../nusb" }
